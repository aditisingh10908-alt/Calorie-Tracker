version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: calorie_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-calorie_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calorie_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-calorie_tracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calorie_user} -d ${POSTGRES_DB:-calorie_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - calorie_network

  # Express.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calorie_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-calorie_user}:${POSTGRES_PASSWORD:-calorie_pass_2024}@postgres:5432/${POSTGRES_DB:-calorie_tracker}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production_2024}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production_2024}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ML_SERVICE_URL: http://ml-service:8000
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - calorie_network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calorie_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - calorie_network

  # Python FastAPI ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: calorie_ml
    restart: unless-stopped
    environment:
      PORT: 8000
      BACKEND_URL: http://backend:5000
      MODEL_DIR: /app/saved_models
    ports:
      - "8000:8000"
    networks:
      - calorie_network

volumes:
  postgres_data:
    driver: local

networks:
  calorie_network:
    driver: bridge
